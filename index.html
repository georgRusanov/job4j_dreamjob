<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script>
        function validate() {
            let ids = ["#name", "#surname", "#description"];
            for(const id of ids) {
                let value = $(id).val()
                if (value === '') {
                    alert("print " + id);
                    return false;
                }
            }
            return true;
        }
        function addRow() {
            const name = $('#name').val();
            const surname = $('#surname').val();
            const description = $('#description').val();

            $('#table tr:last').after('<tr><td>' + name +'</td><td>' + surname +'</td><td>' + description +'</td></tr>');
        }

    </script>

</head>
<body>

<div class="container-fluid">
    <div>
        <form>
            <div class="form-group">
                <label for="name">Имя</label>
                <input type="text" class="form-control" id="name">
            </div>
            <div class="form-group">
                <label for="surname">Фамилия</label>
                <input type="text" class="form-control" id="surname">
            </div>
            <div class="form-group">
                <label for="description">Описание</label>
                <textarea class="form-control" id="description" rows="3"></textarea>
            </div>
            <button type="button" class="btn btn-default" onclick="return validate();">Submit</button>
        </form>
    </div>
    <div>
        <table class="table" id="table">
            <thead>
            <tr>
                <th scope="col">Name</th>
                <th scope="col">Surname</th>
                <th scope="col">Description</th>
            </tr>
            </thead>
        </table>
    </div>
    <div>
        <button type="button" class="btn btn-default" onclick="addRow()">Add row</button>
    </div>
</div>

</body>
</html>
